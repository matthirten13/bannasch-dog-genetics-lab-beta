# site properties and page defaults
title: Danika Bannasch Genetics Laboratory
subtitle: 
description: A dog and horse genetics laboratory located at the Weill School of Veterinary Medicine, UC Davis. We study variants leading to disease and look at the impact of LINE-1 retrotransposons on cancer development.
header: images/pint_background_v4.jpg
footer: images/dna.jpg
proofer: false

# site social media and other links
links:
  email: dlbannasch@ucdavis.edu
  orcid: 0000-0002-7614-7207
  google-scholar: ARkd3DcAAAAJ

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
